<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Your Personalised Suggestions - Skinverse</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body style="background-color:#fff0f6; font-family:'Poppins',sans-serif;">
  <nav class="navbar navbar-light" style="background-color:#ffc1e3;">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="dashboard.html" style="color:#d63384;">🌸 Skinverse</a>
    </div>
  </nav>

  <div class="container text-center mt-5">
    <h2 style="color:#d63384;">💖 Get Your Personalised Suggestions</h2>
    <p class="mt-3 text-muted">Tell us a bit about your skin, and get your ideal routine!</p>

    <div class="mt-5 p-4 rounded" style="background-color:#ffe6f2; display:inline-block; text-align:left; max-width:400px;">
      <form>
        <div class="mb-3">
          <label class="form-label" style="color:#d63384;">Skin Type</label>
          <select class="form-select">
            <option>Oily</option>
            <option>Dry</option>
            <option>Combination</option>
            <option>Sensitive</option>
            <option>Normal</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" style="color:#d63384;">Concern</label>
          <select class="form-select">
            <option>Acne</option>
            <option>Dark Spots</option>
            <option>Wrinkles</option>
            <option>Redness</option>
            <option>Uneven Tone</option>
          </select>
        </div>

        <button type="button" class="btn" style="background-color:#ff80ab; color:white; border-radius:20px;">Get Suggestions</button>
      </form>
    </div>
  </div>
</body>
</html>
